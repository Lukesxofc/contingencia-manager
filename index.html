<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#0b0d11"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Contingência"/>
<title>Contingência Manager</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0b0d11;--surface:#12151b;--surface2:#181c24;--surface3:#1e2230;
--border:#1e2330;--border2:#252b38;
--text:#e2e8f0;--muted:#64748b;--muted2:#3d4a5c;
--green:#34d399;--green-bg:#0a2b1e;--green-border:#064e33;
--red:#f87171;--red-bg:#2d1212;--red-border:#6b2121;
--amber:#fbbf24;--amber-bg:#2a1f00;--amber-border:#6b4a00;
--blue:#60a5fa;--blue-bg:#0f2044;--blue-border:#1e4080;
--purple:#a78bfa;--purple-bg:#1a1035;--purple-border:#4c3380;
--pink:#f472b6;--pink-bg:#2d0f1e;--teal:#2dd4bf;--teal-bg:#0a2420;--teal-border:#0d4a42;
--mono:"DM Mono",monospace;--sans:"Inter",-apple-system,sans-serif;--display:"Syne",sans-serif;
}
html,body{background:var(--bg);height:100%}
body{font-family:var(--sans);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
input,select,button,textarea{font-family:var(--sans)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue)!important;box-shadow:0 0 0 2px rgba(96,165,250,.12)}
.app{min-height:100vh}
.header{border-bottom:1px solid var(--border);padding:16px 24px 18px}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
.header-left{display:flex;align-items:center;gap:12px}
.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-title{font-family:var(--display);font-size:16px;font-weight:800;letter-spacing:-.3px}
.logo-sub{font-size:11px;color:var(--muted);margin-top:1px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.stat-value{font-family:var(--mono);font-size:20px;font-weight:500}
.stat-label{font-size:11px;color:var(--muted);margin-top:3px;font-weight:500}
.toolbar{padding:12px 24px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tabs{display:flex;background:var(--surface);border-radius:8px;border:1px solid var(--border);overflow:hidden;flex-wrap:wrap}
.tab-btn{display:flex;align-items:center;gap:5px;padding:8px 13px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:var(--muted);transition:all .15s;white-space:nowrap}
.tab-btn.active{background:var(--surface2);color:var(--text)}
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:0 12px;flex:1;min-width:140px;max-width:280px}
.search-box input{border:none;background:transparent;color:var(--text);padding:8px 0;font-size:13px;width:100%}
.filter-select{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 26px 8px 12px;font-size:12px;cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%2364748b' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center}
.add-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.content{padding:12px 24px 32px}
.field-input{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:6px 10px;font-size:12px;width:100%;font-family:var(--mono)}
.field-select{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:6px 24px 6px 10px;font-size:12px;cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%2364748b' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 8px center}
.field-textarea{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:8px 10px;font-size:12px;width:100%;font-family:var(--mono);resize:vertical;min-height:80px;line-height:1.5}
.badge{display:inline-flex;align-items:center;gap:5px;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.badge-dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.badge-ativo,.badge-ativa{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge-restrito{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.badge-off{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.badge-desativada{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.badge-review{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.btn-icon{background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--muted);padding:5px 8px;cursor:pointer;display:inline-flex;align-items:center;transition:all .1s}
.btn-icon:hover{background:rgba(255,255,255,.06);color:var(--text)}
.btn-icon.save{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.btn-icon.note-active{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber)}
.btn-copy{background:none;border:none;cursor:pointer;color:var(--muted);padding:2px;display:inline-flex}
.btn-eye{background:none;border:none;cursor:pointer;color:var(--muted);padding:2px;display:inline-flex}
.table-wrap{overflow-x:auto}
.data-table{width:100%;border-collapse:separate;border-spacing:0;font-size:12px}
.data-table th{padding:10px 12px;text-align:left;color:var(--muted);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border);white-space:nowrap}
.data-table td{padding:10px 12px;border-bottom:1px solid #0f1218;vertical-align:middle}
.data-table tr:hover td{background:rgba(255,255,255,.015)}
.mono{font-family:var(--mono)}
.profile-cards{display:none;flex-direction:column;gap:10px}
.p-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.p-card-head{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.p-card-name{font-weight:600;font-size:13px;flex:1}
.p-card-body{border-top:1px solid var(--border)}
.p-card-row{display:flex;align-items:center;padding:9px 14px;gap:10px;border-bottom:1px solid #0e1117}
.p-card-row:last-child{border-bottom:none}
.p-card-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);width:88px;flex-shrink:0}
.p-card-val{font-size:12px;display:flex;align-items:center;gap:5px;flex:1;min-width:0;word-break:break-all;font-family:var(--mono)}
.p-card-footer{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-top:1px solid var(--border);flex-wrap:wrap}
.p-card-actions{display:flex;gap:6px}
.bm-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.bm-head{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:10px}
.bm-head-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.bm-avatar{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#8b5cf6,#6366f1);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.bm-name{font-weight:700;font-size:14px}
.bm-head-right{display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.bm-count{font-size:11px;color:var(--muted);white-space:nowrap}
.bm-body{border-top:1px solid var(--border)}
.bm-section{padding:14px 18px;border-bottom:1px solid var(--border)}
.bm-section:last-child{border-bottom:none}
.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px}
.profile-tags{display:flex;flex-wrap:wrap;gap:6px}
.profile-tag{padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:var(--sans);transition:all .15s}
.profile-tag.connected{border-color:var(--green-border);background:var(--green-bg);color:var(--green)}
.accounts-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.accounts-table{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;min-width:520px}
.accounts-table th{padding:7px 10px;text-align:left;color:var(--muted);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
.accounts-table td{padding:8px 10px;border-bottom:1px solid #0e1117;vertical-align:middle}
.accounts-table tr:last-child td{border-bottom:none}
.empty-state{text-align:center;padding:36px;color:var(--muted2);font-size:13px;background:var(--surface);border-radius:12px;border:1px solid var(--border)}
.chev{transition:transform .2s;display:inline-flex}
.chev.open{transform:rotate(90deg)}
.verif-yes{color:var(--green);font-size:11px;font-weight:700}
.verif-no{color:var(--red);font-size:11px;font-weight:700}
.id-chip-ativo{background:var(--blue-bg);color:var(--blue);padding:2px 8px;border-radius:4px;font-weight:700;font-size:11px;font-family:var(--mono)}
.id-chip-restrito{background:var(--purple-bg);color:var(--purple);padding:2px 8px;border-radius:4px;font-weight:700;font-size:11px;font-family:var(--mono)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:var(--display);font-size:17px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.btn-primary{padding:10px 20px;background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.btn-secondary{padding:10px 20px;background:transparent;border:1px solid var(--border2);border-radius:8px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer}
.avatar-preview{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--border2);cursor:pointer}
.avatar-placeholder{width:80px;height:80px;border-radius:50%;background:var(--surface2);border:2px dashed var(--border2);display:flex;align-items:center;justify-content:center;color:var(--muted2);font-size:10px;cursor:pointer;text-align:center;flex-shrink:0;flex-direction:column;gap:4px}
.sync-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.sync-btn.syncing{color:var(--amber);border-color:var(--amber-border)}
.sync-btn.synced{color:var(--green);border-color:var(--green-border)}
.sync-btn.error{color:var(--red);border-color:var(--red-border)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-flex}
.toast{position:fixed;top:18px;right:18px;background:var(--surface2);border:1px solid var(--border2);color:var(--green);padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,.4);animation:slideIn .25s ease}
@keyframes slideIn{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}
.loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:300}
.loading-logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center}
.loading-bar{width:120px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.loading-bar-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);animation:loadbar 1.5s ease infinite}
@keyframes loadbar{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}
.count-selector{display:flex;align-items:center;gap:6px}
.count-btn{width:22px;height:22px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1}
.count-val{font-family:var(--mono);font-size:13px;min-width:20px;text-align:center}
.nicho-badge{padding:2px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:inline-block}
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){
  .header{padding:12px 16px 14px}.toolbar{padding:10px 16px 0;gap:8px}.content{padding:10px 16px 28px}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px}.stat-value{font-size:18px}
  .table-wrap{display:none}.profile-cards{display:flex}.search-box{max-width:100%;flex:1 1 140px}
  .bm-head{padding:12px 14px}.bm-section{padding:12px 14px}.tab-btn{padding:7px 9px;font-size:11px}
}
</style>

function b64e(s){return btoa(unescape(encodeURIComponent(s)))}
function b64d(s){return decodeURIComponent(escape(atob(s.replace(/\s/g,""))))}
async function ghGet(tok,repo){
  const r=await fetch(`https://api.github.com/repos/${repo}/contents/db.json`,{headers:{Authorization:`token ${tok}`,Accept:"application/vnd.github.v3+json"}});
  if(r.status===404)return null;
  if(r.status===401){const err=new Error("Unauthorized");err.status=401;throw err;}
  if(!r.ok)throw new Error();
  const d=await r.json();
  return{data:JSON.parse(b64d(d.content)),sha:d.sha};
}
async function ghPut(tok,repo,data,sha){
  const body={message:`sync:${new Date().toISOString()}`,content:b64e(JSON.stringify(data,null,2))};
  if(sha)body.sha=sha;
  const r=await fetch(`https://api.github.com/repos/${repo}/contents/db.json`,{method:"PUT",headers:{Authorization:`token ${tok}`,"Content-Type":"application/json",Accept:"application/vnd.github.v3+json"},body:JSON.stringify(body)});
  if(!r.ok)throw new Error();
  return(await r.json()).content.sha;
}

const StatusBadge=({status})=>{
  const d={ativo:"#34d399",ativa:"#34d399",restrito:"#f87171",off:"#fbbf24",desativada:"#64748b",review:"#fbbf24"};
  return <span className={`badge badge-${status}`}><span className="badge-dot" style={{background:d[status]||"#64748b"}}/>{status}</span>;
};
const CopyBtn=({text})=>{
  const [ok,setOk]=useState(false);
  return <button className="btn-copy" onClick={()=>{navigator.clipboard.writeText(text).catch(()=>{});setOk(true);setTimeout(()=>setOk(false),1200)}}>{ok?<Ico.Check/>:<Ico.Copy/>}</button>;
};
const SF=({value})=>{
  const [show,setShow]=useState(false);
  if(!value)return <span style={{color:"var(--muted2)"}}>-</span>;
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,fontFamily:"var(--mono)",fontSize:"12px"}}>
    <span>{show?value:"........"}</span>
    <button className="btn-eye" onClick={()=>setShow(!show)}>{show?<Ico.EyeOff/>:<Ico.Eye/>}</button>
    {show&&<CopyBtn text={value}/>}
  </span>;
};
const NICHO_C={"MATERNIDADE":{bg:"#2d1a4a",c:"#c084fc"},"SAUDE":{bg:"#0a2b1e",c:"#34d399"},"ED":{bg:"#2a1f00",c:"#fbbf24"},"FINANCAS":{bg:"#0f2044",c:"#60a5fa"},"FITNESS":{bg:"#1a2a0a",c:"#86efac"}};
const NB=({n})=>{const c=NICHO_C[n]||{bg:"#1e2230",c:"#94a3b8"};return <span className="nicho-badge" style={{background:c.bg,color:c.c}}>{n||"-"}</span>};
const CS=({m})=>m==="USD"?<span style={{fontSize:10,background:"#0f2044",color:"#60a5fa",padding:"1px 6px",borderRadius:4,fontWeight:700,fontFamily:"var(--mono)"}}>USD</span>:<span style={{fontSize:10,background:"#0a2b1e",color:"#34d399",padding:"1px 6px",borderRadius:4,fontWeight:700,fontFamily:"var(--mono)"}}>BRL</span>;

const NotesModal=({p,onSave,onClose})=>{
  const [foto,setFoto]=useState(p.foto||"");
  const [notas,setNotas]=useState(p.notas||"");
  const [cookies,setCookies]=useState(p.cookies||"");
  const [fotosNotas,setFotosNotas]=useState(p.fotosNotas||[]);
  const [tab,setTab]=useState("notas");
  const fr=useRef();
  const frN=useRef();

  const addFotoNota=e=>{
    const files=Array.from(e.target.files);
    files.forEach(f=>{
      const r=new FileReader();
      r.onload=ev=>setFotosNotas(prev=>[...prev,{id:Date.now()+Math.random(),src:ev.target.result,leg:""}]);
      r.readAsDataURL(f);
    });
    e.target.value="";
  };
  const removeFotaNota=id=>setFotosNotas(prev=>prev.filter(x=>x.id!==id));
  const updateLeg=(id,leg)=>setFotosNotas(prev=>prev.map(x=>x.id===id?{...x,leg}:x));

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:560}}>
        <div className="modal-title">
          <span>📋 Notas — {p.name||p.perfil||p.nome||p.id}</span>
          <button className="btn-icon" onClick={onClose}><Ico.X/></button>
        </div>
        <div style={{display:"flex",alignItems:"flex-start",gap:16,marginBottom:16}}>
          <div style={{flexShrink:0}}>
            {foto?<img src={foto} className="avatar-preview" alt="" onClick={()=>fr.current.click()}/>
              :<div className="avatar-placeholder" onClick={()=>fr.current.click()}><Ico.Note/><span>Foto</span></div>}
            <input ref={fr} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setFoto(ev.target.result);r.readAsDataURL(f)}}/>
            <div style={{fontSize:10,color:"var(--muted2)",textAlign:"center",marginTop:4}}>Avatar</div>
          </div>
          <div style={{flex:1}}>
            <div style={{display:"flex",gap:4,marginBottom:10,background:"var(--surface2)",borderRadius:8,padding:3,border:"1px solid var(--border)"}}>
              {[{id:"notas",label:"📝 Notas"},{id:"fotos",label:"🖼 Fotos"},{id:"cookies",label:"🍪 Cookies"}].map(t=>(
                <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"6px 8px",border:"none",borderRadius:6,background:tab===t.id?"var(--surface3)":"transparent",color:tab===t.id?"var(--text)":"var(--muted)",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"var(--sans)"}}>
                  {t.label}
                </button>
              ))}
            </div>
            {tab==="notas"&&<textarea className="field-textarea" value={notas} onChange={e=>setNotas(e.target.value)} placeholder="Notas, observacoes, dados extras..." style={{minHeight:130}}/>}
            {tab==="fotos"&&(
              <div>
                <input ref={frN} type="file" accept="image/*" multiple style={{display:"none"}} onChange={addFotoNota}/>
                <button className="add-btn" style={{width:"100%",justifyContent:"center",marginBottom:10,background:"var(--surface2)",border:"1px dashed var(--border2)",color:"var(--muted)"}} onClick={()=>frN.current.click()}>
                  <Ico.Plus/> Adicionar Fotos
                </button>
                {fotosNotas.length===0&&<div style={{textAlign:"center",padding:24,color:"var(--muted2)",fontSize:12}}>Nenhuma foto anexada</div>}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,maxHeight:200,overflowY:"auto"}}>
                  {fotosNotas.map(fn=>(
                    <div key={fn.id} style={{position:"relative",borderRadius:8,overflow:"hidden",border:"1px solid var(--border2)"}}>
                      <img src={fn.src} style={{width:"100%",height:90,objectFit:"cover",display:"block"}} alt=""/>
                      <input value={fn.leg} onChange={e=>updateLeg(fn.id,e.target.value)} placeholder="Legenda..." style={{width:"100%",background:"var(--surface2)",border:"none",borderTop:"1px solid var(--border2)",color:"var(--text)",fontSize:10,padding:"4px 6px",fontFamily:"var(--sans)"}}/>
                      <button onClick={()=>removeFotaNota(fn.id)} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,.7)",border:"none",borderRadius:4,color:"var(--red)",cursor:"pointer",padding:"2px 5px",fontSize:11,lineHeight:1}}>✕</button>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {tab==="cookies"&&(
              <>
                <textarea className="field-textarea" value={cookies} onChange={e=>setCookies(e.target.value)} placeholder="Cole os cookies aqui..." style={{minHeight:130,fontSize:10}}/>
                <div style={{fontSize:10,color:"var(--muted2)",marginTop:4}}>Cookies salvos no GitHub de forma segura.</div>
              </>
            )}
          </div>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button className="btn-secondary" onClick={onClose}>Cancelar</button>
          <button className="btn-primary" onClick={()=>onSave({foto,notas,cookies,fotosNotas})}>Salvar</button>
        </div>
      </div>
    </div>
  );
};

function App(){
  const [profiles,setProfiles]=useState(IP);
  const [bms,setBms]=useState(IB);
  const [igs,setIgs]=useState(IIG);
  const [machines,setMachines]=useState(IM);
  const [tab,setTab]=useState("perfis");
  const [q,setQ]=useState("");
  const [expandedBM,setExpandedBM]=useState(null);
  const [editP,setEditP]=useState(null);
  const [editB,setEditB]=useState(null);
  const [editC,setEditC]=useState(null);
  const [editIG,setEditIG]=useState(null);
  const [editM,setEditM]=useState(null);
  const [filt,setFilt]=useState("todos");
  const [toast,setToast]=useState(null);
  const [loading,setLoading]=useState(true);
  const [syncSt,setSyncSt]=useState("idle");
  const [syncT,setSyncT]=useState(null);
  const [notesP,setNotesP]=useState(null);
  const [installPr,setInstallPr]=useState(null);
  const sha=useRef(null);
  const tok=useRef(null);
  const repo=useRef(null);
  const timer=useRef(null);

  const [showCfg,setShowCfg]=useState(false);
  const [cfgTok,setCfgTok]=useState("");
  const [cfgRepo,setCfgRepo]=useState("Lukesxofc/contingencia-manager");
  const [cfgErr,setCfgErr]=useState("");

  useEffect(()=>{
    const h=e=>{e.preventDefault();setInstallPr(e)};
    window.addEventListener("beforeinstallprompt",h);
    window.addEventListener("appinstalled",()=>setInstallPr(null));
    return()=>window.removeEventListener("beforeinstallprompt",h);
  },[]);

  useEffect(()=>{
    const t=localStorage.getItem("gh-t")||"";
    const r=localStorage.getItem("gh-r")||"Lukesxofc/contingencia-manager";
    tok.current=t;
    repo.current=r;
    setCfgTok(t);
    setCfgRepo(r);
    if(!t){setShowCfg(true);setLoading(false);}
    else load(t,r);
  },[]);

  const saveCfg=async()=>{
    setCfgErr("");
    const t=cfgTok.trim();
    const r=cfgRepo.trim();
    if(!t){setCfgErr("Token obrigatório");return;}
    if(!r||!r.includes("/")){setCfgErr("Repositório inválido (ex: user/repo)");return;}
    localStorage.setItem("gh-t",t);
    localStorage.setItem("gh-r",r);
    tok.current=t;
    repo.current=r;
    setShowCfg(false);
    await load(t,r);
  };

  const load=async(t,r)=>{
    setSyncSt("syncing");
    try{
      const res=await ghGet(t,r);
      if(res){
        sha.current=res.sha;
        // merge: keep initial fields (fotosNotas, moeda) if missing in stored data
        const merge=(stored,init)=>init.map(def=>{const s=stored.find(x=>x.id===def.id);return s?{...def,...s}:def});
        if(res.data.profiles)setProfiles(merge(res.data.profiles,IP));
        else setProfiles(IP);
        if(res.data.bms)setBms(res.data.bms);
        else setBms(IB);
        if(res.data.igs)setIgs(res.data.igs);
        else setIgs(IIG);
        if(res.data.machines)setMachines(res.data.machines);
        else setMachines(IM);
        setSyncT(new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}));
        setSyncSt("synced");
      }else{
        // No db.json — use fresh initial data, clear old localStorage
        localStorage.removeItem("p");localStorage.removeItem("b");
        localStorage.removeItem("ig");localStorage.removeItem("m");
        setProfiles(IP);setBms(IB);setIgs(IIG);setMachines(IM);
        setSyncSt("idle");
      }
    }catch(e){
      setSyncSt("error");
      if(e&&e.status===401){setCfgErr("Token inválido ou expirado. Gere um novo token.");setShowCfg(true);}
    }
    setLoading(false);
  };
  const loadLocal=()=>{
    try{const x=localStorage.getItem("p");if(x)setProfiles(JSON.parse(x));}catch{}
    try{const x=localStorage.getItem("b");if(x)setBms(JSON.parse(x));}catch{}
    try{const x=localStorage.getItem("ig");if(x)setIgs(JSON.parse(x));}catch{}
    try{const x=localStorage.getItem("m");if(x)setMachines(JSON.parse(x));}catch{}
  };
  const saveGH=useCallback(async(p,b,ig,m)=>{
    if(!tok.current||!repo.current)return;
    setSyncSt("syncing");
    try{const ns=await ghPut(tok.current,repo.current,{profiles:p,bms:b,igs:ig,machines:m},sha.current);sha.current=ns;setSyncT(new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}));setSyncSt("synced");}
    catch{setSyncSt("error");}
  },[]);

  const toast2=msg=>{setToast(msg);setTimeout(()=>setToast(null),2500)};
  const saveAll=useCallback((p,b,ig,m)=>{
    localStorage.setItem("p",JSON.stringify(p));localStorage.setItem("b",JSON.stringify(b));
    localStorage.setItem("ig",JSON.stringify(ig));localStorage.setItem("m",JSON.stringify(m));
    if(timer.current)clearTimeout(timer.current);
    timer.current=setTimeout(()=>saveGH(p,b,ig,m),1500);
  },[saveGH]);

  const uP=p=>{setProfiles(p);saveAll(p,bms,igs,machines)};
  const uB=b=>{setBms(b);saveAll(profiles,b,igs,machines)};
  const uIG=ig=>{setIgs(ig);saveAll(profiles,bms,ig,machines)};
  const uM=m=>{setMachines(m);saveAll(profiles,bms,igs,m)};

  const stats={tp:profiles.length,ta:profiles.filter(x=>x.status==="ativo").length,tr:profiles.filter(x=>x.status==="restrito").length,tig:igs.length,tm:machines.length};

  const addP=()=>{const n=Math.max(...profiles.map(x=>parseInt(x.id.replace(/\D/g,""))||0))+1;const np=[...profiles,{id:`P${String(n).padStart(2,"0")}`,name:"",acessoFB:"",senhaFB:"",email:"",senhaEmail:"",status:"restrito",idVerificada:false,token:"",foto:"",notas:"",cookies:"",fotosNotas:[]}];uP(np);setEditP(np[np.length-1].id);toast2("Perfil adicionado")};
  const addBM=()=>{const nb=[...bms,{id:`BM${String(bms.length+1).padStart(2,"0")}`,name:"",bmId:"",perfisConectados:[],status:"ativa",limiteContas:5,contas:[]}];uB(nb);setEditB(nb[nb.length-1].id);setExpandedBM(nb[nb.length-1].id);toast2("BM adicionada")};
  const addConta=bmId=>{const nb=bms.map(b=>{if(b.id!==bmId)return b;const n=b.contas.length+1;return{...b,contas:[...b.contas,{id:`CA${String(n).padStart(2,"0")}`,nome:"",contaId:"",status:"ativa",perfilVinculado:"",gasto:0,limite:50,moeda:"BRL"}]}});uB(nb);toast2("Conta adicionada")};
  const addIG=()=>{const ni=[...igs,{id:`IG${String(igs.length+1).padStart(2,"0")}`,perfil:"",login:"",senha:"",nicho:"",token:"",notas:"",fotosNotas:[]}];uIG(ni);setEditIG(ni[ni.length-1].id);toast2("Conta IG adicionada")};
  const addM=()=>{const nm=[...machines,{id:`M${String(machines.length+1).padStart(2,"0")}`,nome:"",login:"",senha:"",selecao:"",token:"",notas:"",fotosNotas:[]}];uM(nm);setEditM(nm[nm.length-1].id);toast2("Maquina adicionada")};

  const upPf=(id,f,v)=>uP(profiles.map(x=>x.id===id?{...x,[f]:v}:x));
  const upBM=(id,f,v)=>uB(bms.map(x=>x.id===id?{...x,[f]:v}:x));
  const upConta=(bmId,cId,f,v)=>uB(bms.map(b=>b.id!==bmId?b:{...b,contas:b.contas.map(c=>c.id===cId?{...c,[f]:v}:c)}));
  const upIG2=(id,f,v)=>uIG(igs.map(x=>x.id===id?{...x,[f]:v}:x));
  const upM2=(id,f,v)=>uM(machines.map(x=>x.id===id?{...x,[f]:v}:x));

  const delP=id=>{uP(profiles.filter(x=>x.id!==id));toast2("Removido")};
  const delBM=id=>{uB(bms.filter(x=>x.id!==id));toast2("BM removida")};
  const delConta=(bmId,cId)=>uB(bms.map(b=>b.id!==bmId?b:{...b,contas:b.contas.filter(c=>c.id!==cId)}));
  const delIG=id=>{uIG(igs.filter(x=>x.id!==id));toast2("Removido")};
  const delM=id=>{uM(machines.filter(x=>x.id!==id));toast2("Removido")};
  const toggleBMp=(bmId,pId)=>uB(bms.map(b=>{if(b.id!==bmId)return b;const has=b.perfisConectados.includes(pId);return{...b,perfisConectados:has?b.perfisConectados.filter(x=>x!==pId):[...b.perfisConectados,pId]}}));

  const saveNotes=(pid,data,type="profiles")=>{
    if(type==="ig"){uIG(igs.map(x=>x.id===pid?{...x,...data}:x));setNotesP(null);toast2("Notas salvas!");}
    else if(type==="m"){uM(machines.map(x=>x.id===pid?{...x,...data}:x));setNotesP(null);toast2("Notas salvas!");}
    else{uP(profiles.map(x=>x.id===pid?{...x,...data}:x));setNotesP(null);toast2("Notas salvas!");}
  };

  const fP=profiles.filter(x=>{const s=q.toLowerCase();return(!s||x.name.toLowerCase().includes(s)||x.id.toLowerCase().includes(s)||x.email.toLowerCase().includes(s))&&(filt==="todos"||x.status===filt)});
  const fB=bms.filter(x=>{const s=q.toLowerCase();return(!s||x.name.toLowerCase().includes(s))&&(filt==="todos"||x.status===filt)});
  const fIG=igs.filter(x=>{const s=q.toLowerCase();return!s||x.perfil.toLowerCase().includes(s)||x.login.toLowerCase().includes(s)||x.nicho.toLowerCase().includes(s)});
  const fM=machines.filter(x=>{const s=q.toLowerCase();return!s||x.nome.toLowerCase().includes(s)||x.login.toLowerCase().includes(s)||x.selecao.toLowerCase().includes(s)});

  const CfgModal=()=>(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&tok.current&&setShowCfg(false)}>
      <div className="modal" style={{maxWidth:440}}>
        <div className="modal-title">
          <span>⚙️ Configurar Sincronização</span>
          {tok.current&&<button className="btn-icon" onClick={()=>setShowCfg(false)}><Ico.X/></button>}
        </div>
        <div style={{fontSize:12,color:"var(--muted)",marginBottom:16,lineHeight:1.6}}>
          Os dados são sincronizados via GitHub. Gere um token em{" "}
          <a href="https://github.com/settings/tokens/new" target="_blank" style={{color:"var(--blue)"}}>github.com/settings/tokens</a>{" "}
          com a permissão <strong style={{color:"var(--text)"}}>repo</strong> marcada.
        </div>
        {cfgErr&&<div style={{background:"var(--red-bg)",border:"1px solid var(--red-border)",color:"var(--red)",borderRadius:8,padding:"8px 12px",fontSize:12,marginBottom:12}}>{cfgErr}</div>}
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div>
            <div style={{fontSize:11,color:"var(--muted)",fontWeight:600,marginBottom:4}}>TOKEN DO GITHUB</div>
            <input className="field-input" type="password" value={cfgTok} onChange={e=>setCfgTok(e.target.value)} placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" style={{fontSize:13,padding:"9px 12px"}}/>
          </div>
          <div>
            <div style={{fontSize:11,color:"var(--muted)",fontWeight:600,marginBottom:4}}>REPOSITÓRIO</div>
            <input className="field-input" value={cfgRepo} onChange={e=>setCfgRepo(e.target.value)} placeholder="usuario/nome-do-repo" style={{fontSize:13,padding:"9px 12px"}}/>
          </div>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"space-between",marginTop:20}}>
          <button onClick={async()=>{if(!confirm("Resetar todos os dados para os valores iniciais?"))return;localStorage.removeItem("p");localStorage.removeItem("b");localStorage.removeItem("ig");localStorage.removeItem("m");sha.current=null;setProfiles(IP);setBms(IB);setIgs(IIG);setMachines(IM);setShowCfg(false);toast2("Dados resetados!");}} style={{padding:"8px 14px",background:"var(--red-bg)",border:"1px solid var(--red-border)",borderRadius:8,color:"var(--red)",fontSize:12,fontWeight:600,cursor:"pointer"}}>🔄 Resetar Dados</button>
          <div style={{display:"flex",gap:10}}>
            {tok.current&&<button className="btn-secondary" onClick={()=>setShowCfg(false)}>Cancelar</button>}
            <button className="btn-primary" onClick={saveCfg}>Salvar e Conectar</button>
          </div>
        </div>
      </div>
    </div>
  );

  const SyncBtn=()=>(
    <div style={{display:"flex",gap:6,alignItems:"center"}}>
      {installPr&&<button className="add-btn" style={{padding:"6px 12px",fontSize:"11px",background:"linear-gradient(135deg,#059669,#10b981)"}} onClick={()=>installPr.prompt().then(()=>setInstallPr(null))}>Instalar App</button>}
      <button className="sync-btn" title="Configurações" onClick={()=>{setCfgErr("");setShowCfg(true)}}><Ico.Gear/></button>
      <button className={`sync-btn ${syncSt}`} onClick={()=>load(tok.current,repo.current)} title={syncT?`Sync ${syncT}`:"Sincronizar"}>
        <span className={syncSt==="syncing"?"spin":""}><Ico.Refresh/></span><Ico.Cloud/>
      </button>
    </div>
  );

  const PCard=({p})=>{
    const isE=editP===p.id;
    const hasN=p.notas||p.foto||p.cookies;
    const lBMs=bms.filter(b=>b.perfisConectados.includes(p.id));
    return(
      <div className="p-card">
        <div className="p-card-head">
          {isE?<input className="field-input" value={p.name} onChange={e=>upPf(p.id,"name",e.target.value)} placeholder="Nome" style={{flex:1}}/>

          {!isE&&<StatusBadge status={p.status}/>}
          {isE&&<select className="field-select" value={p.status} onChange={e=>upPf(p.id,"status",e.target.value)}><option value="ativo">Ativo</option><option value="restrito">Restrito</option><option value="off">Off</option></select>}
        </div>
        <div className="p-card-body">
          {[{l:"Acesso FB",v:p.acessoFB,f:"acessoFB",c:true},{l:"Senha FB",v:p.senhaFB,f:"senhaFB",s:true},{l:"Email",v:p.email,f:"email",c:true},{l:"Senha Email",v:p.senhaEmail,f:"senhaEmail",s:true},{l:"Token 2FA",v:p.token,f:"token",s:true}].map(row=>(

                {isE?<input className="field-input" value={row.v} onChange={e=>upPf(p.id,row.f,e.target.value)} placeholder={row.l}/>

              </span>
            </div>
          ))}
        </div>
        <div className="p-card-footer">
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",fontSize:11}}>
            {isE?<label style={{display:"flex",alignItems:"center",gap:5,color:"var(--muted)"}}><input type="checkbox" checked={p.idVerificada} onChange={e=>upPf(p.id,"idVerificada",e.target.checked)} style={{accentColor:"#3b82f6"}}/>ID Verif.</label>
              :<span className={p.idVerificada?"verif-yes":"verif-no"}>ID {p.idVerificada?"SIM":"NAO"}</span>}
            {lBMs.map(b=><span key={b.id} style={{background:"var(--purple-bg)",color:"var(--purple)",padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:600}}>{b.name||b.id}</span>)}
          </div>
          <div className="p-card-actions">
            <button className={`btn-icon${hasN?" note-active":""}`} onClick={()=>setNotesP(p)} title="Notas">
              {p.foto?<img src={p.foto} style={{width:16,height:16,borderRadius:"50%",objectFit:"cover"}} alt=""/>:<Ico.Note/>}
            </button>
            {isE?<button className="btn-icon save" onClick={()=>{setEditP(null);toast2("Salvo!")}}><Ico.Check/></button>:<button className="btn-icon" onClick={()=>setEditP(p.id)}><Ico.Edit/></button>}
            <button className="btn-icon" onClick={()=>delP(p.id)}><Ico.Trash/></button>
          </div>
        </div>
      </div>
    );
  };

  if(loading)return(
    <div className="loading">
      <div className="loading-logo"><Ico.Shield/></div>
      <div className="loading-bar"><div className="loading-bar-fill"/></div>
      <div style={{fontSize:13,color:"var(--muted)"}}>Sincronizando...</div>
    </div>
  );

  const addBtn=tab==="perfis"?addP:tab==="bms"?addBM:tab==="instagram"?addIG:addM;
  const addLbl=tab==="perfis"?"Novo Perfil":tab==="bms"?"Nova BM":tab==="instagram"?"Nova Conta":"Nova Maquina";

  return(
    <div className="app">
      {toast&&<div className="toast">{toast}</div>}
      {notesP&&<NotesModal p={notesP} onSave={d=>saveNotes(notesP.id,d,notesP._type||"profiles")} onClose={()=>setNotesP(null)}/>}
      {showCfg&&<CfgModal/>}

      <div className="header">
        <div className="header-top">
          <div className="header-left">
            <div className="logo"><Ico.Shield/></div>
            <div><div className="logo-title">Contingencia Manager</div><div className="logo-sub">FB · Instagram · Maquinas</div></div>
          </div>
          <SyncBtn/>
        </div>
        <div className="stats-grid">
          {[{l:"Perfis FB",v:stats.tp,s:`${stats.ta} ativos`,c:"#3b82f6"},{l:"Restritos",v:stats.tr,s:"perfis",c:"#f87171"},{l:"Instagram",v:stats.tig,s:"contas",c:"#f472b6"},{l:"Maquinas",v:stats.tm,s:"navegadores",c:"#34d399"}].map((x,i)=>(
            <div key={i} className="stat-card">
              <div className="stat-value" style={{color:x.c}}>{x.v}</div>
              <div className="stat-label">{x.l} <span style={{color:"var(--muted2)"}}>· {x.s}</span></div>
            </div>
          ))}
        </div>
      </div>

      <div className="toolbar">
        <div className="tabs">
          {[{id:"perfis",icon:<Ico.Users/>,l:"Perfis FB"},{id:"bms",icon:<Ico.Briefcase/>,l:"BMs"},{id:"instagram",icon:<Ico.Insta/>,l:"Instagram"},{id:"maquinas",icon:<Ico.Monitor/>,l:"Maquinas"}].map(t=>(
            <button key={t.id} className={`tab-btn${tab===t.id?" active":""}`} onClick={()=>{setTab(t.id);setQ("");setFilt("todos")}}>{t.icon}{t.l}</button>

        </div>
        <div className="search-box"><Ico.Search/><input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar..."/></div>

        {tab==="perfis"&&<>

              <thead><tr>{["ID","Nome","Acesso FB","Senha FB","Email","Senha Email","Status","ID V.","Token 2FA","BMs","Notas","Acoes"].map(h=><th key={h}>{h}</th>)}</tr></thead>
              <tbody>
                {fP.map(p=>{
                  const isE=editP===p.id;
                  const lBMs=bms.filter(b=>b.perfisConectados.includes(p.id));
                  const hasN=p.notas||p.foto||p.cookies;
                  return(
                    <tr key={p.id}>
                      <td><span className={p.status==="ativo"?"id-chip-ativo":"id-chip-restrito"}>{p.id}</span></td>

                      <td className="mono" style={{minWidth:130}}>{isE?<input className="field-input" value={p.acessoFB} onChange={e=>upPf(p.id,"acessoFB",e.target.value)}/>:<span style={{display:"inline-flex",alignItems:"center",gap:4}}>{p.acessoFB||"-"}{p.acessoFB&&<CopyBtn text={p.acessoFB}/>}</span>}</td>
                      <td>{isE?<input className="field-input" value={p.senhaFB} onChange={e=>upPf(p.id,"senhaFB",e.target.value)}/>:<SF value={p.senhaFB}/>}</td>
                      <td style={{minWidth:160}}>{isE?<input className="field-input" value={p.email} onChange={e=>upPf(p.id,"email",e.target.value)}/>:<span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11}}>{p.email||"-"}{p.email&&<CopyBtn text={p.email}/>}</span>}</td>
                      <td>{isE?<input className="field-input" value={p.senhaEmail} onChange={e=>upPf(p.id,"senhaEmail",e.target.value)}/>:<SF value={p.senhaEmail}/>}</td>
                      <td>{isE?<select className="field-select" value={p.status} onChange={e=>upPf(p.id,"status",e.target.value)}><option value="ativo">Ativo</option><option value="restrito">Restrito</option><option value="off">Off</option></select>:<StatusBadge status={p.status}/>}</td>
                      <td style={{textAlign:"center"}}>{isE?<input type="checkbox" checked={p.idVerificada} onChange={e=>upPf(p.id,"idVerificada",e.target.checked)} style={{accentColor:"#3b82f6"}}/>:<span className={p.idVerificada?"verif-yes":"verif-no"}>{p.idVerificada?"SIM":"NAO"}</span>}</td>
                      <td>{isE?<input className="field-input" value={p.token} onChange={e=>upPf(p.id,"token",e.target.value)}/>:<SF value={p.token}/>}</td>
                      <td>{lBMs.length>0?lBMs.map(b=><span key={b.id} style={{background:"var(--purple-bg)",color:"var(--purple)",padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:600,marginRight:4}}>{b.name||b.id}</span>):<span style={{color:"var(--muted2)"}}>-</span>}</td>
                      <td><button className={`btn-icon${hasN?" note-active":""}`} onClick={()=>setNotesP(p)} title="Notas">{p.foto?<img src={p.foto} style={{width:16,height:16,borderRadius:"50%",objectFit:"cover"}} alt=""/>:<Ico.Note/>}</button></td>
                      <td><div style={{display:"flex",gap:4}}>
                        {isE?<button className="btn-icon save" onClick={()=>{setEditP(null);toast2("Salvo!")}}><Ico.Check/></button>:<button className="btn-icon" onClick={()=>setEditP(p.id)}><Ico.Edit/></button>}
                        <button className="btn-icon" onClick={()=>delP(p.id)}><Ico.Trash/></button>
                      </div></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            {fP.length===0&&<div className="empty-state">Nenhum perfil encontrado</div>}
          </div>
          <div className="profile-cards">{fP.map(p=><PCard key={p.id} p={p}/>)}{fP.length===0&&<div className="empty-state">Nenhum perfil</div>}</div>
        </>}

        {tab==="bms"&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {fB.map(bm=>{
              const isExp=expandedBM===bm.id;
              const isEB=editB===bm.id;
              const lim=bm.limiteContas||5;
              return(
                <div key={bm.id} className="bm-card">
                  <div className="bm-head" onClick={()=>setExpandedBM(isExp?null:bm.id)}>
                    <div className="bm-head-left">
                      <span className={`chev${isExp?" open":""}`}><Ico.ChevRight/></span>
                      <div className="bm-avatar">{bm.id.replace("BM","")}</div>
                      <div>
                        {isEB?<input className="field-input" value={bm.name} onClick={e=>e.stopPropagation()} onChange={e=>upBM(bm.id,"name",e.target.value)} placeholder="Nome da BM" style={{fontWeight:700}}/>
                          :<div className="bm-name">{bm.name||<span style={{color:"var(--muted2)"}}>Sem nome</span>}</div>}
                        {bm.bmId&&!isEB&&<div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}><span style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--muted)"}}>{bm.bmId}</span><CopyBtn text={bm.bmId}/></div>}
                        {isEB&&<input className="field-input" value={bm.bmId} onClick={e=>e.stopPropagation()} onChange={e=>upBM(bm.id,"bmId",e.target.value)} placeholder="ID da BM" style={{marginTop:4,fontSize:11}}/>}
                      </div>
                    </div>
                    <div className="bm-head-right">
                      {isEB?(
                        <div className="count-selector" onClick={e=>e.stopPropagation()}>
                          <span style={{fontSize:10,color:"var(--muted)"}}>Limite:</span>
                          <button className="count-btn" onClick={e=>{e.stopPropagation();upBM(bm.id,"limiteContas",Math.max(1,lim-1))}}>-</button>
                          <span className="count-val">{lim}</span>
                          <button className="count-btn" onClick={e=>{e.stopPropagation();upBM(bm.id,"limiteContas",lim+1)}}>+</button>
                        </div>
                      ):<span className="bm-count">{bm.contas.length}/{lim} contas · {bm.perfisConectados.length}p</span>}
                      {isEB?<select className="field-select" value={bm.status} onClick={e=>e.stopPropagation()} onChange={e=>{e.stopPropagation();upBM(bm.id,"status",e.target.value)}}><option value="ativa">Ativa</option><option value="restrito">Restrito</option><option value="off">Off</option><option value="desativada">Desativada</option></select>:<StatusBadge status={bm.status}/>}
                      <div style={{display:"flex",gap:4}} onClick={e=>e.stopPropagation()}>
                        {isEB?<button className="btn-icon save" onClick={()=>{setEditB(null);toast2("BM salva!")}}><Ico.Check/></button>:<button className="btn-icon" onClick={()=>setEditB(bm.id)}><Ico.Edit/></button>}
                        <button className="btn-icon" onClick={()=>delBM(bm.id)}><Ico.Trash/></button>
                      </div>
                    </div>
                  </div>
                  {isExp&&(
                    <div className="bm-body">
                      <div className="bm-section">
                        <div className="section-label">Perfis Conectados</div>
                        <div className="profile-tags">
                          {profiles.map(p=>{const isC=bm.perfisConectados.includes(p.id);return(
                            <button key={p.id} className={`profile-tag${isC?" connected":""}`} onClick={()=>toggleBMp(bm.id,p.id)}>
                              {isC&&<Ico.Check/>}{p.id}{p.name&&` · ${p.name}`}
                            </button>
                          )})}
                        </div>
                      </div>
                      <div className="bm-section">
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <div className="section-label" style={{marginBottom:0}}>Contas de Anuncio</div>
                            <span style={{fontSize:10,color:bm.contas.length>=lim?"var(--red)":"var(--muted)",fontFamily:"var(--mono)",fontWeight:600}}>{bm.contas.length}/{lim}</span>
                          </div>
                          <button className="add-btn" style={{padding:"4px 10px",fontSize:"11px",borderRadius:6,opacity:bm.contas.length>=lim?.5:1}} onClick={()=>bm.contas.length<lim&&addConta(bm.id)}><Ico.Plus/>Conta</button>
                        </div>
                        {bm.contas.length===0?<div style={{textAlign:"center",padding:20,color:"var(--muted2)",fontSize:12}}>Nenhuma conta</div>:(
                          <div className="accounts-wrap">
                            <table className="accounts-table">
                              <thead><tr>{["Nome","ID Conta","Status","Perfil","Moeda","Gasto","Limite","Acoes"].map(h=><th key={h}>{h}</th>)}</tr></thead>
                              <tbody>
                                {bm.contas.map(c=>{const isEC=editC===`${bm.id}-${c.id}`;const sym=(c.moeda||"BRL")==="USD"?"$":"R$";return(
                                  <tr key={c.id}>
                                    <td>{isEC?<input className="field-input" value={c.nome} onChange={e=>upConta(bm.id,c.id,"nome",e.target.value)} placeholder="Nome"/>:<span style={{fontWeight:600}}>{c.nome||"-"}</span>}</td>
                                    <td className="mono" style={{fontSize:11}}>{isEC?<input className="field-input" value={c.contaId} onChange={e=>upConta(bm.id,c.id,"contaId",e.target.value)} placeholder="act_xxxxx"/>:<span>{c.contaId||"-"}{c.contaId&&<CopyBtn text={c.contaId}/>}</span>}</td>
                                    <td>{isEC?<select className="field-select" value={c.status} onChange={e=>upConta(bm.id,c.id,"status",e.target.value)}><option value="ativa">Ativa</option><option value="off">Off</option><option value="desativada">Desativada</option><option value="review">Review</option></select>:<StatusBadge status={c.status}/>}</td>
                                    <td>{isEC?<select className="field-select" value={c.perfilVinculado} onChange={e=>upConta(bm.id,c.id,"perfilVinculado",e.target.value)}><option value="">-</option>{profiles.map(p=><option key={p.id} value={p.id}>{p.id}·{p.name||"Sem nome"}</option>)}</select>:c.perfilVinculado?<span style={{background:"var(--blue-bg)",color:"var(--blue)",padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:600}}>{c.perfilVinculado}</span>:<span style={{color:"var(--muted2)"}}>-</span>}</td>
                                    <td>{isEC?<select className="field-select" value={c.moeda||"BRL"} onChange={e=>upConta(bm.id,c.id,"moeda",e.target.value)} style={{width:70}}><option value="BRL">BRL R$</option><option value="USD">USD $</option></select>:<CS m={c.moeda||"BRL"}/>}</td>
                                    <td className="mono">{isEC?<input type="number" className="field-input" value={c.gasto} onChange={e=>upConta(bm.id,c.id,"gasto",+e.target.value)} style={{width:80}}/>:`${sym}${c.gasto}`}</td>
                                    <td className="mono">{isEC?<input type="number" className="field-input" value={c.limite} onChange={e=>upConta(bm.id,c.id,"limite",+e.target.value)} style={{width:80}}/>:`${sym}${c.limite}`}</td>

                                  </tr>
                                )})}
                              </tbody>
                            </table>
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
            {fB.length===0&&<div className="empty-state">Nenhuma BM encontrada</div>}
          </div>
        )}

          <div className="table-wrap">
            <table className="data-table">
              <thead><tr>{["Perfil","Login","Senha","Nicho","Token","Notas","Acoes"].map(h=><th key={h}>{h}</th>)}</tr></thead>
              <tbody>
                {fIG.map(ig=>{const isE=editIG===ig.id;return(
                  <tr key={ig.id}>
                    <td style={{minWidth:130}}>{isE?<input className="field-input" value={ig.perfil} onChange={e=>upIG2(ig.id,"perfil",e.target.value)} placeholder="@usuario"/>:<span style={{fontWeight:600,color:"var(--pink)"}}>{ig.perfil||"-"}</span>}</td>
                    <td style={{minWidth:160}}>{isE?<input className="field-input" value={ig.login} onChange={e=>upIG2(ig.id,"login",e.target.value)} placeholder="email"/>:<span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11}}>{ig.login||"-"}{ig.login&&<CopyBtn text={ig.login}/>}</span>}</td>
                    <td>{isE?<input className="field-input" value={ig.senha} onChange={e=>upIG2(ig.id,"senha",e.target.value)}/>:<SF value={ig.senha}/>}</td>
                    <td>{isE?<input className="field-input" value={ig.nicho} onChange={e=>upIG2(ig.id,"nicho",e.target.value)} placeholder="Nicho"/>:<NB n={ig.nicho}/>}</td>
                    <td>{isE?<input className="field-input" value={ig.token} onChange={e=>upIG2(ig.id,"token",e.target.value)} placeholder="Token"/>:<SF value={ig.token}/>}</td>
                    <td><button className={`btn-icon${(ig.notas||(ig.fotosNotas?.length))?" note-active":""}`} onClick={()=>setNotesP({...ig,_type:"ig"})} title="Notas"><Ico.Note/></button></td>
                    <td><div style={{display:"flex",gap:4}}>{isE?<button className="btn-icon save" onClick={()=>{setEditIG(null);toast2("Salvo!")}}><Ico.Check/></button>:<button className="btn-icon" onClick={()=>setEditIG(ig.id)}><Ico.Edit/></button>}<button className="btn-icon" onClick={()=>delIG(ig.id)}><Ico.Trash/></button></div></td>
                  </tr>
                )})}
              </tbody>
            </table>
            {fIG.length===0&&<div className="empty-state">Nenhuma conta Instagram</div>}
          </div>
          <div className="profile-cards">
            {fIG.map(ig=>{const isE=editIG===ig.id;return(
              <div key={ig.id} className="p-card">
                <div className="p-card-head">
                  {isE?<input className="field-input" value={ig.perfil} onChange={e=>upIG2(ig.id,"perfil",e.target.value)} placeholder="@usuario" style={{flex:1}}/>
                    :<><span style={{fontWeight:700,color:"var(--pink)",fontSize:13}}>{ig.perfil||"-"}</span><NB n={ig.nicho}/></>}
                  {isE&&<input className="field-input" value={ig.nicho} onChange={e=>upIG2(ig.id,"nicho",e.target.value)} placeholder="Nicho" style={{width:90}}/>}
                </div>
                <div className="p-card-body">
                  {[{l:"Login",v:ig.login,f:"login",c:true},{l:"Senha",v:ig.senha,f:"senha",s:true},{l:"Token",v:ig.token,f:"token",s:true},{l:"Notas",v:ig.notas,f:"notas"}].map(row=>(
                    <div className="p-card-row" key={row.f}>
                      <span className="p-card-lbl">{row.l}</span>
                      <span className="p-card-val">{isE?<input className="field-input" value={row.v} onChange={e=>upIG2(ig.id,row.f,e.target.value)}/>:row.s?<SF value={row.v}/>:row.v?<><span style={{wordBreak:"break-all"}}>{row.v}</span>{row.c&&<CopyBtn text={row.v}/>}</>:<span style={{color:"var(--muted2)"}}>-</span>}</span>
                    </div>
                  ))}
                </div>
                <div className="p-card-footer"><div/><div className="p-card-actions">{isE?<button className="btn-icon save" onClick={()=>{setEditIG(null);toast2("Salvo!")}}><Ico.Check/></button>:<button className="btn-icon" onClick={()=>setEditIG(ig.id)}><Ico.Edit/></button>}<button className="btn-icon" onClick={()=>delIG(ig.id)}><Ico.Trash/></button></div></div>
              </div>
            )})}
          </div>
        </>}

        {tab==="maquinas"&&<>
          <div className="table-wrap">
            <table className="data-table">
              <thead><tr>{["Maquina","Login","Senha","Selecao","Token","Notas","Acoes"].map(h=><th key={h}>{h}</th>)}</tr></thead>
              <tbody>
                {fM.map(m=>{const isE=editM===m.id;return(
                  <tr key={m.id}>
                    <td style={{minWidth:120}}>{isE?<input className="field-input" value={m.nome} onChange={e=>upM2(m.id,"nome",e.target.value)} placeholder="Nome"/>:<span style={{fontWeight:700,color:"var(--teal)"}}>{m.nome||"-"}</span>}</td>
                    <td style={{minWidth:160}}>{isE?<input className="field-input" value={m.login} onChange={e=>upM2(m.id,"login",e.target.value)} placeholder="login"/>:<span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11}}>{m.login||"-"}{m.login&&<CopyBtn text={m.login}/>}</span>}</td>
                    <td>{isE?<input className="field-input" value={m.senha} onChange={e=>upM2(m.id,"senha",e.target.value)}/>:<SF value={m.senha}/>}</td>
                    <td>{isE?<input className="field-input" value={m.selecao} onChange={e=>upM2(m.id,"selecao",e.target.value)} placeholder="Selecao"/>:m.selecao?<span style={{background:"var(--teal-bg)",color:"var(--teal)",padding:"2px 10px",borderRadius:20,fontSize:11,fontWeight:600}}>{m.selecao}</span>:<span style={{color:"var(--muted2)"}}>-</span>}</td>
                    <td>{isE?<input className="field-input" value={m.token} onChange={e=>upM2(m.id,"token",e.target.value)}/>:<SF value={m.token}/>}</td>
                    <td><button className={`btn-icon${(m.notas||(m.fotosNotas?.length))?" note-active":""}`} onClick={()=>setNotesP({...m,_type:"m"})} title="Notas"><Ico.Note/></button></td>
                    <td><div style={{display:"flex",gap:4}}>{isE?<button className="btn-icon save" onClick={()=>{setEditM(null);toast2("Salvo!")}}><Ico.Check/></button>:<button className="btn-icon" onClick={()=>setEditM(m.id)}><Ico.Edit/></button>}<button className="btn-icon" onClick={()=>delM(m.id)}><Ico.Trash/></button></div></td>
                  </tr>
                )})}
              </tbody>
            </table>
            {fM.length===0&&<div className="empty-state">Nenhuma maquina cadastrada</div>}
          </div>
          <div className="profile-cards">
            {fM.map(m=>{const isE=editM===m.id;return(
              <div key={m.id} className="p-card">
                <div className="p-card-head">
                  {isE?<input className="field-input" value={m.nome} onChange={e=>upM2(m.id,"nome",e.target.value)} placeholder="Nome" style={{flex:1}}/>
                    :<><span style={{fontWeight:700,color:"var(--teal)",fontSize:13}}>{m.nome||"-"}</span>{m.selecao&&<span style={{background:"var(--teal-bg)",color:"var(--teal)",padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:600}}>{m.selecao}</span>}</>}
                  {isE&&<input className="field-input" value={m.selecao} onChange={e=>upM2(m.id,"selecao",e.target.value)} placeholder="Selecao" style={{width:100}}/>}
                </div>
                <div className="p-card-body">
                  {[{l:"Login",v:m.login,f:"login",c:true},{l:"Senha",v:m.senha,f:"senha",s:true},{l:"Token",v:m.token,f:"token",s:true},{l:"Notas",v:m.notas,f:"notas"}].map(row=>(
                    <div className="p-card-row" key={row.f}>
                      <span className="p-card-lbl">{row.l}</span>
                      <span className="p-card-val">{isE?<input className="field-input" value={row.v} onChange={e=>upM2(m.id,row.f,e.target.value)}/>:row.s?<SF value={row.v}/>:row.v?<><span style={{wordBreak:"break-all"}}>{row.v}</span>{row.c&&<CopyBtn text={row.v}/>}</>:<span style={{color:"var(--muted2)"}}>-</span>}</span>
                    </div>
                  ))}
                </div>
                <div className="p-card-footer"><div/><div className="p-card-actions">{isE?<button className="btn-icon save" onClick={()=>{setEditM(null);toast2("Salvo!")}}><Ico.Check/></button>:<button className="btn-icon" onClick={()=>setEditM(m.id)}><Ico.Edit/></button>}<button className="btn-icon" onClick={()=>delM(m.id)}><Ico.Trash/></button></div></div>
              </div>
            )})}
          </div>
        </>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}))}
</script>
</body>
