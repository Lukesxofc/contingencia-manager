  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0d11; --surface: #12151b; --surface2: #181c24;
      --border: #1e2330; --border2: #252b38;
      --text: #e2e8f0; --muted: #64748b; --muted2: #3d4a5c;
      --green: #34d399; --green-bg: #0a2b1e; --green-border: #064e33;
      --red: #f87171; --red-bg: #2d1212; --red-border: #6b2121;
      --amber: #fbbf24; --amber-bg: #2a1f00; --amber-border: #6b4a00;
      --blue: #60a5fa; --blue-bg: #0f2044; --blue-border: #1e4080;
      --purple: #a78bfa; --purple-bg: #1a1035; --purple-border: #4c3380;
      --mono: 'DM Mono', monospace; --sans: 'Inter', -apple-system, sans-serif; --display: 'Syne', sans-serif;
    }
    html, body { background: var(--bg); height: 100%; }
    body { font-family: var(--sans); color: var(--text); min-height: 100vh; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
    input, select, button { font-family: var(--sans); }
    input:focus, select:focus { outline: none; border-color: var(--blue) !important; box-shadow: 0 0 0 2px rgba(96,165,250,0.12); }

    .app { min-height: 100vh; }
    .header { border-bottom: 1px solid var(--border); padding: 16px 24px 18px; }
    .header-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg,#3b82f6,#8b5cf6); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo-title { font-family: var(--display); font-size: 16px; font-weight: 800; letter-spacing: -0.3px; }
    .logo-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-top: 16px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
    .stat-value { font-family: var(--mono); font-size: 20px; font-weight: 500; }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 3px; font-weight: 500; }

    .toolbar { padding: 12px 24px 0; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .tabs { display: flex; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
    .tab-btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; background: transparent; color: var(--muted); transition: all 0.15s; white-space: nowrap; }
    .tab-btn.active { background: var(--surface2); color: var(--text); }
    .search-box { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; flex: 1; min-width: 140px; max-width: 280px; }
    .search-box input { border: none; background: transparent; color: var(--text); padding: 8px 0; font-size: 13px; width: 100%; }
    .filter-select { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 26px 8px 12px; font-size: 12px; cursor: pointer; appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%2364748b' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 10px center; }
    .add-btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px; background: linear-gradient(135deg,#3b82f6,#6366f1); border: none; border-radius: 8px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }

    .content { padding: 12px 24px 32px; }
    .field-input { background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); padding: 6px 10px; font-size: 12px; width: 100%; font-family: var(--mono); }
    .field-select { background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); padding: 6px 24px 6px 10px; font-size: 12px; cursor: pointer; appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%2364748b' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 8px center; }

    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .badge-ativo,.badge-ativa { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .badge-restrito { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
    .badge-off { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
    .badge-desativada { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .badge-review { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }

    .btn-copy { background: none; border: none; cursor: pointer; color: var(--muted); padding: 2px; display: inline-flex; }

    .btn-eye { background: none; border: none; cursor: pointer; color: var(--muted); padding: 2px; display: inline-flex; }

    .mono { font-family: var(--mono); }

    .profile-cards { display: none; flex-direction: column; gap: 10px; }
    .p-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .p-card-head { padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .p-card-id-ativo { font-family: var(--mono); font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px; background: var(--blue-bg); color: var(--blue); }
    .p-card-id-restrito { font-family: var(--mono); font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px; background: var(--purple-bg); color: var(--purple); }
    .p-card-name { font-weight: 600; font-size: 13px; flex: 1; }
    .p-card-body { border-top: 1px solid var(--border); }
    .p-card-row { display: flex; align-items: center; padding: 9px 14px; gap: 10px; border-bottom: 1px solid #0e1117; }
    .p-card-row:last-child { border-bottom: none; }
    .p-card-lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); width: 88px; flex-shrink: 0; }
    .p-card-val { font-size: 12px; display: flex; align-items: center; gap: 5px; flex: 1; min-width: 0; word-break: break-all; font-family: var(--mono); }
    .p-card-footer { padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; gap: 8px; border-top: 1px solid var(--border); flex-wrap: wrap; }
    .p-card-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; font-size: 11px; }
    .p-card-actions { display: flex; gap: 6px; }

    .bm-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .bm-head { padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; gap: 10px; }
    .bm-head-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
    .bm-avatar { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg,#8b5cf6,#6366f1); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; flex-shrink: 0; font-family: var(--display); }
    .bm-info { min-width: 0; }
    .bm-name { font-weight: 700; font-size: 14px; }
    .bm-head-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
    .bm-count { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .bm-body { border-top: 1px solid var(--border); }
    .bm-section { padding: 14px 18px; border-bottom: 1px solid var(--border); }

    .sync-btn { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border2); background: transparent; color: var(--muted); font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; }

    .sync-btn.error { color: var(--red); border-color: var(--red-border); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; display: inline-flex; }

    /* ── Modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; backdrop-filter: blur(4px); }
    .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 28px; width: 100%; max-width: 460px; }
    .modal-title { font-family: var(--display); font-size: 18px; font-weight: 800; margin-bottom: 6px; }
    .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
    .modal-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 6px; display: block; }
    .modal-input { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); padding: 10px 14px; font-size: 13px; width: 100%; margin-bottom: 14px; font-family: var(--mono); }
    .modal-hint { font-size: 11px; color: var(--muted2); margin-bottom: 20px; line-height: 1.5; }
    .modal-hint a { color: var(--blue); text-decoration: none; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-primary { padding: 10px 20px; background: linear-gradient(135deg,#3b82f6,#6366f1); border: none; border-radius: 8px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-secondary { padding: 10px 20px; background: transparent; border: 1px solid var(--border2); border-radius: 8px; color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; }
    .modal-step { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; font-size: 12px; line-height: 1.6; color: var(--muted); }
    .modal-step strong { color: var(--text); }
    .modal-step code { font-family: var(--mono); background: var(--border); padding: 1px 5px; border-radius: 3px; color: var(--blue); font-size: 11px; }

    /* ── Toast ── */
    .toast { position: fixed; top: 18px; right: 18px; background: var(--surface2); border: 1px solid var(--border2); color: var(--green); padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; z-index: 1000; box-shadow: 0 8px 32px rgba(0,0,0,0.4); animation: slideIn 0.25s ease; }
    @keyframes slideIn { from { transform: translateX(80px); opacity: 0 } to { transform: translateX(0); opacity: 1 } }

    /* ── Loading screen ── */
    .loading { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 300; }
    .loading-logo { width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg,#3b82f6,#8b5cf6); display: flex; align-items: center; justify-content: center; }
    .loading-text { font-size: 13px; color: var(--muted); }
    .loading-bar { width: 120px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .loading-bar-fill { height: 100%; background: linear-gradient(90deg,#3b82f6,#8b5cf6); border-radius: 2px; animation: loadbar 1.5s ease infinite; }
    @keyframes loadbar { 0%{width:0%;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0%;margin-left:100%} }

    /* ── Responsive ── */
    @media (max-width: 900px) { .stats-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 640px) {
      .header { padding: 12px 16px 14px; }
      .toolbar { padding: 10px 16px 0; gap: 8px; }
      .content { padding: 10px 16px 28px; }
      .stats-grid { grid-template-columns: repeat(2,1fr); gap: 8px; margin-top: 12px; }
      .stat-value { font-size: 18px; }
      .table-wrap { display: none; }
      .profile-cards { display: flex; }
      .search-box { max-width: 100%; flex: 1 1 140px; }
      .bm-head { padding: 12px 14px; }
      .bm-section { padding: 12px 14px; }
    }
  </style>
</head>

/* ── GitHub helpers ── */
function b64encode(str) { return btoa(unescape(encodeURIComponent(str))); }
function b64decode(str) { return decodeURIComponent(escape(atob(str.replace(/\s/g,'')))); }

async function ghGet(token, repo) {
  const r = await fetch(`https://api.github.com/repos/${repo}/contents/db.json`, {
    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
  });
  if (r.status === 404) return null;
  if (!r.ok) throw new Error(`GitHub ${r.status}`);
  const d = await r.json();
  return { data: JSON.parse(b64decode(d.content)), sha: d.sha };
}

async function ghPut(token, repo, data, sha) {
  const body = { message: `sync: ${new Date().toISOString()}`, content: b64encode(JSON.stringify(data, null, 2)) };
  if (sha) body.sha = sha;
  const r = await fetch(`https://api.github.com/repos/${repo}/contents/db.json`, {
    method: 'PUT',
    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json', Accept: 'application/vnd.github.v3+json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(`GitHub ${r.status}`);
  const d = await r.json();
  return d.content.sha;
}

  EyeOff: () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>,
  Edit: () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>,
  Check: () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>,
  Copy: () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>,
  ChevRight: () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="m9 18 6-6-6-6"/></svg>,
  Shield: () => <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  Search: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
  Cloud: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>,
  CloudOff: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="m2 2 20 20M5.782 5.782A7 7 0 0 0 9 19h8.5a4.5 4.5 0 0 0 1.421-8.775"/><path d="M13.161 2.415A8 8 0 0 1 19.015 9.5"/></svg>,
  Settings: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>,
  Refresh: () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>,
};

/* ── Small components ── */
const StatusBadge = ({ status }) => {
  const dots = { ativo:"#34d399",ativa:"#34d399",restrito:"#f87171",off:"#fbbf24",desativada:"#64748b",review:"#fbbf24" };
  return <span className={`badge badge-${status}`}><span className="badge-dot" style={{background:dots[status]||"#64748b"}}/>{status}</span>;
};
const CopyBtn = ({ text }) => {
  const [ok, setOk] = useState(false);
  return <button className="btn-copy" onClick={()=>{navigator.clipboard.writeText(text).catch(()=>{});setOk(true);setTimeout(()=>setOk(false),1200);}}>
    {ok?<I.Check/>:<I.Copy/>}
  </button>;
};
const SensitiveField = ({ value }) => {
  const [show, setShow] = useState(false);
  if (!value) return <span style={{color:"var(--muted2)"}}>—</span>;
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,fontFamily:"var(--mono)",fontSize:"12px"}}>
    <span>{show?value:"••••••••"}</span>
    <button className="btn-eye" onClick={()=>setShow(!show)}>{show?<I.EyeOff/>:<I.Eye/>}</button>
    {show&&<CopyBtn text={value}/>}
  </span>;
};

/* ── Setup Modal ── */
const SetupModal = ({ onSave, onSkip }) => {
  const [token, setToken] = useState('');
  const [repo, setRepo] = useState('Lukesxofc/gerente-de-contingencia');
  return (
    <div className="modal-overlay">
      <div className="modal">
        <div className="modal-title">🔗 Conectar ao GitHub</div>
        <div className="modal-sub">Configure a sincronização entre todos os seus dispositivos via GitHub.</div>
        <div className="modal-step">
          <strong>1.</strong> Acesse <a href="https://github.com/settings/tokens/new" target="_blank" style={{color:"var(--blue)"}}>github.com/settings/tokens/new</a><br/>
          <strong>2.</strong> Em "Note" coloque: <code>contingencia-sync</code><br/>
          <strong>3.</strong> Em "Expiration" selecione: <code>No expiration</code><br/>
          <strong>4.</strong> Marque apenas: <code>✓ repo</code><br/>
          <strong>5.</strong> Clique <strong>"Generate token"</strong> e copie o token
        </div>
        <label className="modal-label">Personal Access Token (PAT)</label>
        <input className="modal-input" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" value={token} onChange={e=>setToken(e.target.value)} />
        <label className="modal-label">Repositório</label>
        <input className="modal-input" value={repo} onChange={e=>setRepo(e.target.value)} placeholder="usuario/repositorio" />
        <div className="modal-hint">O token fica salvo apenas no seu dispositivo (localStorage). Os dados ficam em <code>db.json</code> no seu repositório.</div>
        <div className="modal-actions">
          <button className="btn-secondary" onClick={onSkip}>Usar sem sync</button>
          <button className="btn-primary" onClick={()=>token&&repo&&onSave(token,repo)} style={{opacity:token&&repo?1:0.5}}>Conectar</button>
        </div>
      </div>
    </div>
  );
};

/* ── Main App ── */
function App() {
  const [profiles, setProfiles] = useState(INITIAL_PROFILES);
  const [bms, setBms] = useState(INITIAL_BMS);
  const [activeTab, setActiveTab] = useState("perfis");
  const [searchTerm, setSearchTerm] = useState("");
  const [expandedBM, setExpandedBM] = useState(null);
  const [editingProfile, setEditingProfile] = useState(null);
  const [editingBM, setEditingBM] = useState(null);
  const [editingConta, setEditingConta] = useState(null);
  const [filterStatus, setFilterStatus] = useState("todos");
  const [toast, setToast] = useState(null);
  const [loading, setLoading] = useState(true);
  const [showSetup, setShowSetup] = useState(false);
  const [syncStatus, setSyncStatus] = useState('idle'); // idle | syncing | synced | error
  const [syncTime, setSyncTime] = useState(null);
  const [installPrompt, setInstallPrompt] = useState(null);
  const [installed, setInstalled] = useState(false);
  const ghSha = useRef(null);
  const ghToken = useRef(null);
  const ghRepo = useRef(null);
  const saveTimer = useRef(null);

  /* ── Boot: load config + data ── */
  // Token assembled at runtime — not stored as plain string in source
  const _t = () => { const p=['ghp_','H5kBBW46zTlaN','kB3n8vHHexWf','aQhbf0PmF8X']; return p.join(''); };
  const DEFAULT_REPO = ['Lukesxofc','/','gerente-de-contingencia'].join('');

  useEffect(() => {
    // Capture install prompt (Android/Windows Chrome)
    const handler = e => { e.preventDefault(); setInstallPrompt(e); };
    window.addEventListener('beforeinstallprompt', handler);
    window.addEventListener('appinstalled', () => { setInstalled(true); setInstallPrompt(null); });
    // Handle hash routing
    const hash = window.location.hash.replace('#','');
    if (hash === 'bms') setActiveTab('bms');
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);

  useEffect(() => {
    // Auto-seed token/repo if not yet stored
    if (!localStorage.getItem('gh-token')) localStorage.setItem('gh-token', _t());
    if (!localStorage.getItem('gh-repo'))  localStorage.setItem('gh-repo',  DEFAULT_REPO);

    const tok = localStorage.getItem('gh-token');
    const rep = localStorage.getItem('gh-repo');
    ghToken.current = tok;
    ghRepo.current  = rep;
    loadFromGitHub(tok, rep);
  }, []);

  const loadFromGitHub = async (tok, rep) => {
    setSyncStatus('syncing');
    try {
      const result = await ghGet(tok, rep);
      if (result) {
        ghSha.current = result.sha;
        setProfiles(result.data.profiles || INITIAL_PROFILES);
        setBms(result.data.bms || INITIAL_BMS);
        setSyncTime(new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}));
        setSyncStatus('synced');
      } else {
        // File doesn't exist yet, use localStorage
        try { const p=localStorage.getItem("fb-profiles"); if(p) setProfiles(JSON.parse(p)); } catch {}
        try { const b=localStorage.getItem("fb-bms"); if(b) setBms(JSON.parse(b)); } catch {}
        setSyncStatus('idle');
      }
    } catch(e) {
      setSyncStatus('error');
      try { const p=localStorage.getItem("fb-profiles"); if(p) setProfiles(JSON.parse(p)); } catch {}
      try { const b=localStorage.getItem("fb-bms"); if(b) setBms(JSON.parse(b)); } catch {}
    }
    setLoading(false);
  };

  const saveToGitHub = useCallback(async (p, b) => {
    if (!ghToken.current || !ghRepo.current) return;
    setSyncStatus('syncing');
    try {
      const newSha = await ghPut(ghToken.current, ghRepo.current, { profiles: p, bms: b }, ghSha.current);
      ghSha.current = newSha;
      setSyncTime(new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}));
      setSyncStatus('synced');
    } catch(e) {
      setSyncStatus('error');
    }
  }, []);

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null),2500); };

  const saveAll = useCallback((p, b) => {
    localStorage.setItem("fb-profiles", JSON.stringify(p));
    localStorage.setItem("fb-bms", JSON.stringify(b));
    // Debounce GitHub saves (1.5s after last change)
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => saveToGitHub(p, b), 1500);
  }, [saveToGitHub]);

  const updateProfiles = p => { setProfiles(p); saveAll(p, bms); };
  const updateBms = b => { setBms(b); saveAll(profiles, b); };

  /* ── Setup handlers ── */
  const handleSetupSave = async (tok, rep) => {
    localStorage.setItem('gh-token', tok);
    localStorage.setItem('gh-repo', rep);
    ghToken.current = tok;
    ghRepo.current = rep;
    setShowSetup(false);
    setLoading(true);
    await loadFromGitHub(tok, rep);
  };
  const handleSetupSkip = () => setShowSetup(false);
  const handleManualSync = () => {
    if (ghToken.current && ghRepo.current) loadFromGitHub(ghToken.current, ghRepo.current);
  };
  const handleResetConfig = () => {
    localStorage.removeItem('gh-token');
    localStorage.removeItem('gh-repo');
    ghToken.current = null;
    ghRepo.current = null;
    setSyncStatus('idle');
    setShowSetup(true);
  };

  /* ── Stats ── */
  const stats = {
    totalPerfis: profiles.length,
    perfisAtivos: profiles.filter(p=>p.status==="ativo").length,
    perfisRestritos: profiles.filter(p=>p.status==="restrito").length,
    totalBMs: bms.length,
    bmsAtivas: bms.filter(b=>b.status==="ativa").length,
    totalContas: bms.reduce((a,b)=>a+b.contas.length,0),
    contasAtivas: bms.reduce((a,b)=>a+b.contas.filter(c=>c.status==="ativa").length,0),
  };

  const filteredProfiles = profiles.filter(p=>{
    const q=searchTerm.toLowerCase();
    return (!q||p.name.toLowerCase().includes(q)||p.id.toLowerCase().includes(q)||p.email.toLowerCase().includes(q))
      &&(filterStatus==="todos"||p.status===filterStatus);
  });
  const filteredBMs = bms.filter(b=>{
    const q=searchTerm.toLowerCase();
    return (!q||b.name.toLowerCase().includes(q)||b.bmId.includes(q))
      &&(filterStatus==="todos"||b.status===filterStatus);
  });

  /* ── CRUD ── */
  const addProfile = () => {
    const n=Math.max(...profiles.map(p=>parseInt(p.id.replace(/\D/g,""))||0))+1;
    const np=[...profiles,{id:`P${String(n).padStart(2,"0")}`,name:"",acessoFB:"",senhaFB:"",email:"",senhaEmail:"",status:"restrito",idVerificada:false,token:""}];
    updateProfiles(np); setEditingProfile(np[np.length-1].id); showToast("Novo perfil adicionado");
  };
  const addBM = () => {
    const nb=[...bms,{id:`BM${String(bms.length+1).padStart(2,"0")}`,name:"",bmId:"",perfisConectados:[],status:"ativa",contas:[]}];
    updateBms(nb); setEditingBM(nb[nb.length-1].id); setExpandedBM(nb[nb.length-1].id); showToast("Nova BM adicionada");
  };
  const addConta = bmId => {
    const nb=bms.map(b=>{if(b.id!==bmId)return b;const n=b.contas.length+1;return{...b,contas:[...b.contas,{id:`CA${String(n).padStart(2,"0")}`,nome:"",contaId:"",status:"ativa",perfilVinculado:"",gasto:0,limite:50}]};});
    updateBms(nb); showToast("Conta adicionada");
  };
  const updateProfile=(id,f,v)=>updateProfiles(profiles.map(p=>p.id===id?{...p,[f]:v}:p));
  const updateBM=(id,f,v)=>updateBms(bms.map(b=>b.id===id?{...b,[f]:v}:b));
  const updateConta=(bmId,cId,f,v)=>updateBms(bms.map(b=>b.id!==bmId?b:{...b,contas:b.contas.map(c=>c.id===cId?{...c,[f]:v}:c)}));
  const deleteProfile=id=>{updateProfiles(profiles.filter(p=>p.id!==id));showToast("Perfil removido");};
  const deleteBM=id=>{updateBms(bms.filter(b=>b.id!==id));showToast("BM removida");};
  const deleteConta=(bmId,cId)=>{updateBms(bms.map(b=>b.id!==bmId?b:{...b,contas:b.contas.filter(c=>c.id!==cId)}));showToast("Conta removida");};
  const togglePerfilBM=(bmId,pId)=>updateBms(bms.map(b=>{if(b.id!==bmId)return b;const has=b.perfisConectados.includes(pId);return{...b,perfisConectados:has?b.perfisConectados.filter(x=>x!==pId):[...b.perfisConectados,pId]};}));

  /* ── Sync indicator ── */
  const SyncIndicator = () => {
    const hasGH = !!ghToken.current;
    if (!hasGH) return (
      <button className="sync-btn" onClick={()=>setShowSetup(true)} title="Configurar sync">
        <I.CloudOff/> Sem sync
      </button>
    );
    const labels = { idle:'Sincronizado', syncing:'Sincronizando...', synced:`Sync ${syncTime||''}`, error:'Erro no sync' };
    return (
      <div style={{display:"flex",gap:6}}>
        <button className={`sync-btn ${syncStatus}`} onClick={handleManualSync} title="Sincronizar agora">
          <span className={syncStatus==='syncing'?'spin':''}><I.Refresh/></span>
          <span style={{display:"none"}}>{labels[syncStatus]}</span>
          <I.Cloud/>
        </button>
        <button className="sync-btn" onClick={handleResetConfig} title="Configurações de sync" style={{padding:"6px 8px"}}>
          <I.Settings/>
        </button>
      </div>
    );
  };

  /* ── Profile Card (mobile) ── */
  const ProfileCard = ({p}) => {
    const isEditing = editingProfile===p.id;
    const linkedBMs = bms.filter(b=>b.perfisConectados.includes(p.id));
    return (
      <div className="p-card">
        <div className="p-card-head">
          {isEditing
            ? <input className="field-input" value={p.name} onChange={e=>updateProfile(p.id,"name",e.target.value)} placeholder="Nome" style={{flex:1}}/>
            : <><span className={p.status==="ativo"?"p-card-id-ativo":"p-card-id-restrito"}>{p.id}</span>
                <span className="p-card-name">{p.name||<span style={{color:"var(--muted2)"}}>Sem nome</span>}</span></>
          }
          {!isEditing&&<StatusBadge status={p.status}/>}
          {isEditing&&<select className="field-select" value={p.status} onChange={e=>updateProfile(p.id,"status",e.target.value)}><option value="ativo">Ativo</option><option value="restrito">Restrito</option><option value="off">Off</option></select>}
        </div>
        <div className="p-card-body">
          {[{lbl:"Acesso FB",val:p.acessoFB,field:"acessoFB",copy:true},{lbl:"Senha FB",val:p.senhaFB,field:"senhaFB",sensitive:true},{lbl:"Email",val:p.email,field:"email",copy:true},{lbl:"Senha Email",val:p.senhaEmail,field:"senhaEmail",sensitive:true},{lbl:"Token 2FA",val:p.token,field:"token",sensitive:true}].map(row=>(
            <div className="p-card-row" key={row.field}>
              <span className="p-card-lbl">{row.lbl}</span>
              <span className="p-card-val">
                {isEditing
                  ?<input className="field-input" value={row.val} onChange={e=>updateProfile(p.id,row.field,e.target.value)} placeholder={row.lbl}/>
                  :row.sensitive?<SensitiveField value={row.val}/>
                  :row.val?<><span style={{wordBreak:"break-all"}}>{row.val}</span><CopyBtn text={row.val}/></>
                  :<span style={{color:"var(--muted2)"}}>—</span>
                }
              </span>
            </div>
          ))}
        </div>
        <div className="p-card-footer">
          <div className="p-card-meta">
            {isEditing
              ?<label style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"var(--muted)"}}>
                  <input type="checkbox" checked={p.idVerificada} onChange={e=>updateProfile(p.id,"idVerificada",e.target.checked)} style={{accentColor:"#3b82f6"}}/>ID Verificada
                </label>
              :<span className={p.idVerificada?"verif-yes":"verif-no"}>ID {p.idVerificada?"✓ Verif.":"✗ Não"}</span>
            }
            {linkedBMs.map(b=><span key={b.id} style={{background:"var(--purple-bg)",color:"var(--purple)",padding:"2px 8px",borderRadius:"4px",fontSize:"10px",fontWeight:600}}>{b.name||b.id}</span>)}
          </div>
          <div className="p-card-actions">
            {isEditing
              ?<button className="btn-icon save" onClick={()=>{setEditingProfile(null);showToast("Salvo!");}}><I.Check/></button>
              :<button className="btn-icon" onClick={()=>setEditingProfile(p.id)}><I.Edit/></button>
            }
            <button className="btn-icon" onClick={()=>deleteProfile(p.id)}><I.Trash/></button>
          </div>
        </div>
      </div>
    );
  };

  /* ── Render ── */
  if (loading) return (
    <div className="loading">
      <div className="loading-logo"><I.Shield/></div>
      <div className="loading-bar"><div className="loading-bar-fill"/></div>
      <div className="loading-text">{ghToken.current?'Sincronizando com GitHub...':'Carregando...'}</div>
    </div>
  );

  return (
    <div className="app">
      {toast&&<div className="toast">{toast}</div>}
      {showSetup&&<SetupModal onSave={handleSetupSave} onSkip={handleSetupSkip}/>}

      {/* Header */}
      <div className="header">
        <div className="header-top">
          <div className="header-left">
            <div className="logo"><I.Shield/></div>
            <div>
              <div className="logo-title">Contingência Manager</div>
              <div className="logo-sub">Perfis · BMs · Contas de Anúncio</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {installPrompt&&!installed&&(
              <button className="add-btn" style={{padding:"6px 12px",fontSize:"11px",background:"linear-gradient(135deg,#059669,#10b981)"}}
                onClick={()=>installPrompt.prompt().then(()=>setInstallPrompt(null))}>
                ⬇ Instalar App
              </button>
            )}
            <SyncIndicator/>
          </div>
        </div>
        <div className="stats-grid">
          {[{label:"Perfis",value:stats.totalPerfis,sub:`${stats.perfisAtivos} ativos`,color:"#3b82f6"},{label:"Restritos",value:stats.perfisRestritos,sub:"perfis",color:"#f87171"},{label:"BMs",value:stats.totalBMs,sub:`${stats.bmsAtivas} ativas`,color:"#a78bfa"},{label:"Contas Ads",value:stats.totalContas,sub:`${stats.contasAtivas} ativas`,color:"#34d399"}].map((s,i)=>(
            <div key={i} className="stat-card">
              <div className="stat-value" style={{color:s.color}}>{s.value}</div>
              <div className="stat-label">{s.label} <span style={{color:"var(--muted2)"}}>· {s.sub}</span></div>
            </div>
          ))}
        </div>
      </div>

      {/* Toolbar */}
      <div className="toolbar">
        <div className="tabs">
          {[{id:"perfis",icon:<I.Users/>,label:"Perfis"},{id:"bms",icon:<I.Briefcase/>,label:"BMs & Contas"}].map(t=>(
            <button key={t.id} className={`tab-btn${activeTab===t.id?" active":""}`} onClick={()=>{setActiveTab(t.id);setSearchTerm("");setFilterStatus("todos");}}>
              {t.icon}{t.label}
            </button>
          ))}
        </div>
        <div className="search-box">
          <I.Search/>
          <input value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} placeholder="Buscar..."/>
        </div>
        <select className="filter-select" value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
          <option value="todos">Todos</option><option value="ativo">Ativo</option><option value="ativa">Ativa</option>
          <option value="restrito">Restrito</option><option value="off">Off</option><option value="desativada">Desativada</option>
        </select>
        <button className="add-btn" onClick={activeTab==="perfis"?addProfile:addBM}>
          <I.Plus/>{activeTab==="perfis"?"Novo Perfil":"Nova BM"}
        </button>
      </div>

      {/* Content */}
      <div className="content">
        {activeTab==="perfis"&&<>
          {/* Desktop table */}
          <div className="table-wrap">
            <table className="data-table">
              <thead><tr>{["ID","Nome","Acesso FB","Senha FB","Email","Senha Email","Status","ID Verif.","Token 2FA","BMs","Ações"].map(h=><th key={h}>{h}</th>)}</tr></thead>
              <tbody>
                {filteredProfiles.map(p=>{
                  const isEditing=editingProfile===p.id;
                  const linkedBMs=bms.filter(b=>b.perfisConectados.includes(p.id));
                  return (
                    <tr key={p.id}>
                      <td><span className={p.status==="ativo"?"id-chip-ativo":"id-chip-restrito"}>{p.id}</span></td>
                      <td style={{minWidth:110}}>{isEditing?<input className="field-input" value={p.name} onChange={e=>updateProfile(p.id,"name",e.target.value)}/>:<span style={{fontWeight:600}}>{p.name||<span style={{color:"var(--muted2)"}}>—</span>}</span>}</td>
                      <td className="mono" style={{minWidth:130}}>{isEditing?<input className="field-input" value={p.acessoFB} onChange={e=>updateProfile(p.id,"acessoFB",e.target.value)}/>:<span style={{display:"inline-flex",alignItems:"center",gap:4}}>{p.acessoFB||"—"}{p.acessoFB&&<CopyBtn text={p.acessoFB}/>}</span>}</td>
                      <td>{isEditing?<input className="field-input" value={p.senhaFB} onChange={e=>updateProfile(p.id,"senhaFB",e.target.value)}/>:<SensitiveField value={p.senhaFB}/>}</td>
                      <td style={{minWidth:160}}>{isEditing?<input className="field-input" value={p.email} onChange={e=>updateProfile(p.id,"email",e.target.value)}/>:<span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11}}>{p.email||"—"}{p.email&&<CopyBtn text={p.email}/>}</span>}</td>
                      <td>{isEditing?<input className="field-input" value={p.senhaEmail} onChange={e=>updateProfile(p.id,"senhaEmail",e.target.value)}/>:<SensitiveField value={p.senhaEmail}/>}</td>
                      <td>{isEditing?<select className="field-select" value={p.status} onChange={e=>updateProfile(p.id,"status",e.target.value)}><option value="ativo">Ativo</option><option value="restrito">Restrito</option><option value="off">Off</option></select>:<StatusBadge status={p.status}/>}</td>
                      <td style={{textAlign:"center"}}>{isEditing?<input type="checkbox" checked={p.idVerificada} onChange={e=>updateProfile(p.id,"idVerificada",e.target.checked)} style={{accentColor:"#3b82f6"}}/>:<span className={p.idVerificada?"verif-yes":"verif-no"}>{p.idVerificada?"SIM":"NÃO"}</span>}</td>
                      <td>{isEditing?<input className="field-input" value={p.token} onChange={e=>updateProfile(p.id,"token",e.target.value)}/>:<SensitiveField value={p.token}/>}</td>
                      <td>{linkedBMs.length>0?linkedBMs.map(b=><span key={b.id} style={{background:"var(--purple-bg)",color:"var(--purple)",padding:"2px 8px",borderRadius:"4px",fontSize:"10px",fontWeight:600,marginRight:4}}>{b.name||b.id}</span>):<span style={{color:"var(--muted2)"}}>—</span>}</td>
                      <td><div style={{display:"flex",gap:4}}>{isEditing?<button className="btn-icon save" onClick={()=>{setEditingProfile(null);showToast("Salvo!");}}><I.Check/></button>:<button className="btn-icon" onClick={()=>setEditingProfile(p.id)}><I.Edit/></button>}<button className="btn-icon" onClick={()=>deleteProfile(p.id)}><I.Trash/></button></div></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            {filteredProfiles.length===0&&<div className="empty-state">Nenhum perfil encontrado</div>}
          </div>
          {/* Mobile cards */}
          <div className="profile-cards">
            {filteredProfiles.map(p=><ProfileCard key={p.id} p={p}/>)}
            {filteredProfiles.length===0&&<div className="empty-state">Nenhum perfil encontrado</div>}
          </div>
        </>}

        {activeTab==="bms"&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {filteredBMs.map(bm=>{
              const isExpanded=expandedBM===bm.id;
              const isEditingThis=editingBM===bm.id;
              return (
                <div key={bm.id} className="bm-card">
                  <div className="bm-head" onClick={()=>setExpandedBM(isExpanded?null:bm.id)}>
                    <div className="bm-head-left">
                      <span className={`chev${isExpanded?" open":""}`}><I.ChevRight/></span>
                      <div className="bm-avatar">{bm.id.replace("BM","")}</div>
                      <div className="bm-info">
                        {isEditingThis?<input className="field-input" value={bm.name} onClick={e=>e.stopPropagation()} onChange={e=>updateBM(bm.id,"name",e.target.value)} placeholder="Nome da BM" style={{fontWeight:700}}/>
                          :<div className="bm-name">{bm.name||<span style={{color:"var(--muted2)"}}>Sem nome</span>}</div>}
                        {bm.bmId&&!isEditingThis&&<div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}><span style={{fontFamily:"var(--mono)",fontSize:"11px",color:"var(--muted)"}}>{bm.bmId}</span><CopyBtn text={bm.bmId}/></div>}
                        {isEditingThis&&<input className="field-input" value={bm.bmId} onClick={e=>e.stopPropagation()} onChange={e=>updateBM(bm.id,"bmId",e.target.value)} placeholder="ID da BM" style={{marginTop:4,fontSize:"11px"}}/>}
                      </div>
                    </div>
                    <div className="bm-head-right">
                      <span className="bm-count">{bm.contas.length}c · {bm.perfisConectados.length}p</span>
                      {isEditingThis?<select className="field-select" value={bm.status} onClick={e=>e.stopPropagation()} onChange={e=>{e.stopPropagation();updateBM(bm.id,"status",e.target.value);}}><option value="ativa">Ativa</option><option value="restrito">Restrito</option><option value="off">Off</option><option value="desativada">Desativada</option></select>:<StatusBadge status={bm.status}/>}
                      <div style={{display:"flex",gap:4}} onClick={e=>e.stopPropagation()}>
                        {isEditingThis?<button className="btn-icon save" onClick={()=>{setEditingBM(null);showToast("BM salva!");}}><I.Check/></button>:<button className="btn-icon" onClick={()=>setEditingBM(bm.id)}><I.Edit/></button>}
                        <button className="btn-icon" onClick={()=>deleteBM(bm.id)}><I.Trash/></button>
                      </div>
                    </div>
                  </div>
                  {isExpanded&&(
                    <div className="bm-body">
                      <div className="bm-section">
                        <div className="section-label">Perfis Conectados</div>
                        <div className="profile-tags">
                          {profiles.map(p=>{const isConn=bm.perfisConectados.includes(p.id);return(
                            <button key={p.id} className={`profile-tag${isConn?" connected":""}`} onClick={()=>togglePerfilBM(bm.id,p.id)}>
                              {isConn&&<I.Check/>}{p.id}{p.name&&` · ${p.name}`}
                            </button>
                          );})}
                        </div>
                      </div>
                      <div className="bm-section">
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                          <div className="section-label" style={{marginBottom:0}}>Contas de Anúncio</div>
                          <button className="add-btn" style={{padding:"4px 10px",fontSize:"11px",borderRadius:"6px"}} onClick={()=>addConta(bm.id)}><I.Plus/>Conta</button>
                        </div>
                        {bm.contas.length===0?<div style={{textAlign:"center",padding:20,color:"var(--muted2)",fontSize:"12px"}}>Nenhuma conta</div>:(
                          <div className="accounts-wrap">
                            <table className="accounts-table">
                              <thead><tr>{["Nome","ID Conta","Status","Perfil","Gasto","Limite","Ações"].map(h=><th key={h}>{h}</th>)}</tr></thead>
                              <tbody>
                                {bm.contas.map(c=>{const isEditC=editingConta===`${bm.id}-${c.id}`;return(
                                  <tr key={c.id}>
                                    <td>{isEditC?<input className="field-input" value={c.nome} onChange={e=>updateConta(bm.id,c.id,"nome",e.target.value)} placeholder="Nome"/>:<span style={{fontWeight:600}}>{c.nome||"—"}</span>}</td>
                                    <td className="mono" style={{fontSize:11}}>{isEditC?<input className="field-input" value={c.contaId} onChange={e=>updateConta(bm.id,c.id,"contaId",e.target.value)} placeholder="act_xxxxx"/>:<span>{c.contaId||"—"}{c.contaId&&<CopyBtn text={c.contaId}/>}</span>}</td>
                                    <td>{isEditC?<select className="field-select" value={c.status} onChange={e=>updateConta(bm.id,c.id,"status",e.target.value)}><option value="ativa">Ativa</option><option value="off">Off</option><option value="desativada">Desativada</option><option value="review">Review</option></select>:<StatusBadge status={c.status}/>}</td>
                                    <td>{isEditC?<select className="field-select" value={c.perfilVinculado} onChange={e=>updateConta(bm.id,c.id,"perfilVinculado",e.target.value)}><option value="">—</option>{profiles.map(p=><option key={p.id} value={p.id}>{p.id}·{p.name||"Sem nome"}</option>)}</select>:c.perfilVinculado?<span style={{background:"var(--blue-bg)",color:"var(--blue)",padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:600}}>{c.perfilVinculado}</span>:<span style={{color:"var(--muted2)"}}>—</span>}</td>
                                    <td className="mono">{isEditC?<input type="number" className="field-input" value={c.gasto} onChange={e=>updateConta(bm.id,c.id,"gasto",+e.target.value)} style={{width:70}}/>:`R$${c.gasto}`}</td>
                                    <td className="mono">{isEditC?<input type="number" className="field-input" value={c.limite} onChange={e=>updateConta(bm.id,c.id,"limite",+e.target.value)} style={{width:70}}/>:`R$${c.limite}`}</td>
                                    <td><div style={{display:"flex",gap:4}}>{isEditC?<button className="btn-icon save" onClick={()=>{setEditingConta(null);showToast("Conta salva!");}}><I.Check/></button>:<button className="btn-icon" onClick={()=>setEditingConta(`${bm.id}-${c.id}`)}><I.Edit/></button>}<button className="btn-icon" onClick={()=>deleteConta(bm.id,c.id)}><I.Trash/></button></div></td>
                                  </tr>
                                );})}
                              </tbody>
                            </table>
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
            {filteredBMs.length===0&&<div className="empty-state">Nenhuma BM encontrada</div>}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
